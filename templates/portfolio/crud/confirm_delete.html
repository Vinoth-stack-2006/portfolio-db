{% extends 'portfolio/dashboard_base.html' %}
{% block title %}Delete {{ type }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Confirm Delete</h1>
</div>
<div class="form-card" style="max-width:500px">
  <p style="color:var(--muted);margin-bottom:1.5rem">Are you sure you want to delete this {{ type }}?</p>
  <div style="background:rgba(247,37,133,0.06);border:1px solid rgba(247,37,133,0.2);padding:1rem;margin-bottom:1.5rem">
    <strong style="color:var(--neon3)">{{ obj }}</strong>
  </div>
  <form method="post">
    {% csrf_token %}
    <div style="display:flex;gap:1rem">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="javascript:history.back()" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
